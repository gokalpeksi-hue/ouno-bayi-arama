<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

// ============= DESIGN TOKENS =============
const C = {

const SEG = {
  'A+':     { bg: '#DCE8D0', fg: '#2D5016', label: 'A+' },
  'A':      { bg: '#D6E4F0', fg: '#1E3A5F', label: 'A'  },
  'B':      { bg: '#F5E8C8', fg: '#7A4A0E', label: 'B'  },
  'C':      { bg: '#F5DDC8', fg: '#7A2D0E', label: 'C'  },

const SEG_ORDER = ['A+', 'A', 'B', 'C', 'D', 'KAPALI'];

// ============= ICONS (inline SVG, no lucide dependency) =============
const Icon = {
  Upload: ({size=16, color='currentColor'}) => (

    </svg>
  ),
  Search: ({size=16, color='currentColor'}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

  X: ({size=16, color='currentColor'}) => (

      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>

      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>

      <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    </svg>
  ),
  ChevronDown: ({size=12, color='currentColor'}) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

      <polyline points="9 18 15 12 9 6"/>

      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>

// ============= UTILS =============

const tr = (s) => String(s ?? '').toLocaleLowerCase('tr-TR')
  .replace(/[ığüşöçâî]/g, m => ({'ı':'i','ğ':'g','ü':'u','ş':'s','ö':'o','ç':'c','â':'a','î':'i'}[m] || m));

const normColName = (col) => tr(col).replace(/[^a-z0-9]/g, '');

const COLUMN_MAP = {
  segment:  ['klasman', 'bayisegmentesyonu', 'segment', 'bayisegment', 'sinif', 'segmentasyon'],
  tabela:   ['tabelaismi', 'tabela', 'tabelaadi'],
  patron:   ['patron', 'sahibi', 'sahip', 'yetkili'],
  unvan:    ['chunvani', 'unvan', 'cariunvan', 'unvani', 'firmaunvani', 'firmaadi'],
  bolge:    ['bolge'],
  sehir:    ['sehir', 'il'],
  ilce:     ['ilce'],
  adres:    ['adres'],
  telefon:  ['telefon', 'tel', 'telefonno', 'phone', 'gsm', 'cep'],
  durum:    ['durum', 'status', 'aktif'],
  bayiTipi: ['bayitipi', 'tip', 'kanal'],
  notlar:   ['sahaaciklama', 'sahayorumu', 'genelyorum', 'aciklama', 'notlar', 'not'],
  koordinat:['enlemveboylam', 'enlemboylam', 'koordinat', 'koordinatlar', 'latlng', 'gpskoordinat', 'lokasyon', 'konum'],
};

const buildLookup = (cols) => {
  const lookup = {};
  for (const col of cols) {
    const norm = normColName(col);
    for (const [target, sources] of Object.entries(COLUMN_MAP)) {
      if (lookup[target] !== undefined) continue;
      if (sources.includes(norm)) lookup[target] = col;
    }
  }
  for (const col of cols) {
    const norm = normColName(col);
    if (!norm) continue;
    for (const [target, sources] of Object.entries(COLUMN_MAP)) {
      if (lookup[target] !== undefined) continue;
      if (sources.some(s => norm.includes(s) && s.length >= 3)) lookup[target] = col;
    }
  }
  return lookup;
};

const mapRow = (row, lookup) => {
  const out = {};
  for (const [target, srcCol] of Object.entries(lookup)) {
    const v = row[srcCol];
    if (v != null && String(v).trim() !== '') out[target] = String(v).trim();
  }
  const noteCols = Object.keys(row).filter(k => {
    const n = normColName(k);
    return (n.includes('aciklama') || n.includes('yorum') || n.includes('not')) && lookup.notlar !== k;
  });
  const extraNotes = noteCols.map(k => row[k]).filter(v => v && String(v).trim()).map(v => String(v).trim());
  if (extraNotes.length) {
    out.notlar = [out.notlar, ...extraNotes].filter(Boolean).join(' · ');
  }
  return out;
};

const normalizePhone = (phone) => {
  if (!phone) return '';
  const digits = String(phone).replace(/\D/g, '');
  if (digits.length === 10 && digits.startsWith('5'))
    return `0${digits.slice(0,3)} ${digits.slice(3,6)} ${digits.slice(6,8)} ${digits.slice(8)}`;
  if (digits.length === 11 && digits.startsWith('0'))
    return `${digits.slice(0,4)} ${digits.slice(4,7)} ${digits.slice(7,9)} ${digits.slice(9)}`;
  if (digits.length === 12 && digits.startsWith('90')) {
    const r = '0' + digits.slice(2);
    return `${r.slice(0,4)} ${r.slice(4,7)} ${r.slice(7,9)} ${r.slice(9)}`;
  }
  return String(phone);
};

const normalizeSegment = (s) => {
  if (!s) return '';
  const c = String(s).toUpperCase().trim().replace(/\s+/g, '');
  if (['A+', 'A++', 'APLUS'].includes(c)) return 'A+';
  if (c === 'A') return 'A';
  if (c === 'B') return 'B';
  if (c === 'C') return 'C';
  if (c === 'D') return 'D';
  if (c.startsWith('KAPAL') || c.startsWith('KAPAT')) return 'KAPALI';
  return c.length <= 3 ? c : '';
};

// Parse "37.71 , 30.28" or "38.42 - 27.13" or "37.71,30.28" → {lat, lng}
const parseCoord = (s) => {
  if (!s) return null;
  const str = String(s).trim();
  const m = str.match(/(-?\d+\.?\d*)\s*[,\-\s]+\s*(-?\d+\.?\d*)/);
  if (!m) return null;
  const lat = parseFloat(m[1]);
  const lng = parseFloat(m[2]);
  if (isNaN(lat) || isNaN(lng)) return null;
  if (Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;
  if (lat === 0 && lng === 0) return null;
  return { lat, lng };
};

const mapsUrl = (coord) => coord ? `https://www.google.com/maps?q=${coord.lat},${coord.lng}` : null;

const filenameToBolge = (filename) => {
  const base = filename.replace(/\.[^.]+$/, '').toUpperCase();
  const cleaned = base
    .replace(/[_\-.]/g, ' ')
    .replace(/\b(BÖLGE|BOLGE|XLSX?|BAYI|BAYİ|LISTE|LİSTE|LISTESI|LİSTESİ|LISTELERI|LİSTELERİ|MIX|VERI|VERİ)\b/g, '')
    .replace(/\d+/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  return cleaned.split(' ').filter(Boolean).map(w => w[0] + w.slice(1).toLowerCase()).join(' ') || null;
};

const parseFile = async (file) => {
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, { type: 'array' });
  const allRows = [];
  const fileBolge = filenameToBolge(file.name);

  for (const sheetName of wb.SheetNames) {
    const ws = wb.Sheets[sheetName];
    let parsed = null;
    for (const range of [0, 1, 2]) {
      const data = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false, range });
      if (data.length === 0) continue;
      const lookup = buildLookup(Object.keys(data[0]));
      const mappedCount = Object.keys(lookup).length;
      if (mappedCount >= 3) { parsed = { data, lookup }; break; }
    }
    if (!parsed) continue;
    for (const row of parsed.data) {
      const mapped = mapRow(row, parsed.lookup);
      if (!mapped.tabela && !mapped.unvan && !mapped.patron) continue;
      if (!mapped.bolge && fileBolge) mapped.bolge = fileBolge;
      mapped.segment = normalizeSegment(mapped.segment);
      mapped.telefon = normalizePhone(mapped.telefon);
      mapped.koordinat = parseCoord(mapped.koordinat);
      mapped.sourceFile = file.name;
      mapped.sheetName = sheetName;
      mapped.id = `${file.name}::${sheetName}::${allRows.length}::${Math.random().toString(36).slice(2,8)}`;
      allRows.push(mapped);
    }
  }
  return allRows;
};

const SKEY_LIST = 'ouno_dealers_v1';

  try {
    localStorage.setItem(SKEY_LIST, JSON.stringify(dealers));

    return true;
  } catch (e) {
    alert('Veri kaydedilemedi: ' + e.message + '\n(Tarayıcı limiti aşılmış olabilir)');
    return false;
  }
};

function App() {
  const [dealers, setDealers] = useState([]);
  const [meta, setMeta] = useState(null);
  const [loading, setLoading] = useState(true);
  const [importing, setImporting] = useState(false);
  const [importStatus, setImportStatus] = useState('');
  const [query, setQuery] = useState('');
  const [filters, setFilters] = useState({ bolge: new Set(), sehir: new Set(), ilce: new Set(), segment: new Set(), bayiTipi: new Set() });
  const [onlyWithCoord, setOnlyWithCoord] = useState(false);
  const [selectedDealer, setSelectedDealer] = useState(null);
  const [showLimit, setShowLimit] = useState(100);

  useEffect(() => {
    const { dealers, meta } = loadFromStorage();
    setDealers(dealers);
    setMeta(meta);
    setLoading(false);
  }, []);

  const handleFiles = async (files) => {
    setImporting(true);
    setImportStatus('');
    try {
      const allNew = [];
      const fileInfo = [];
      for (const file of files) {
        setImportStatus(`Okunuyor: ${file.name}`);
        const rows = await parseFile(file);
        allNew.push(...rows);
        fileInfo.push({ name: file.name, count: rows.length });
      }
      const updated = [...dealers, ...allNew];
      const newMeta = { lastUpdated: new Date().toISOString(), files: [...(meta?.files || []), ...fileInfo] };
      saveToStorage(updated, newMeta);
      setDealers(updated);
      setMeta(newMeta);
      setImportStatus(`✓ ${allNew.length} bayi eklendi (${files.length} dosya)`);
      setTimeout(() => setImportStatus(''), 4000);
    } catch (e) {
      console.error(e);
      setImportStatus(`✕ Hata: ${e.message}`);
    } finally {
      setImporting(false);
    }
  };

  const handleClear = () => {
    if (!confirm('Tüm bayi verisi silinecek. Devam?')) return;
    localStorage.removeItem(SKEY_LIST);
    localStorage.removeItem(SKEY_META);
    setDealers([]);
    setMeta(null);
  };

  const computeFacets = (excludeKey) => {
    const q = tr(query);
    return dealers.filter(d => {
      for (const [k, set] of Object.entries(filters)) {
        if (k === excludeKey) continue;
        if (set.size > 0 && !set.has(d[k] || '__empty__')) return false;
      }
      if (onlyWithCoord && !d.koordinat) return false;
      if (q) {
        const hay = tr([d.tabela, d.unvan, d.patron, d.sehir, d.ilce, d.telefon, d.adres, d.notlar].filter(Boolean).join(' '));
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  };

  const facetCounts = (key) => {
    const filtered = computeFacets(key);
    const counts = new Map();
    for (const d of filtered) {
      const v = d[key] || '';
      if (!v) continue;
      counts.set(v, (counts.get(v) || 0) + 1);
    }
    return Array.from(counts.entries()).map(([value, count]) => ({ value, label: value, count })).sort((a, b) => b.count - a.count);
  };

  const bolgeFacets = useMemo(() => facetCounts('bolge'), [dealers, filters, query]);
  const sehirFacets = useMemo(() => facetCounts('sehir'), [dealers, filters, query]);
  const ilceFacets  = useMemo(() => facetCounts('ilce'),  [dealers, filters, query]);
  const tipFacets   = useMemo(() => facetCounts('bayiTipi'), [dealers, filters, query]);
  const segmentFacets = useMemo(() => {
    const filtered = computeFacets('segment');
    const counts = new Map();
    for (const d of filtered) counts.set(d.segment || '', (counts.get(d.segment || '') || 0) + 1);
    return SEG_ORDER.map(s => ({ value: s, label: SEG[s].label, count: counts.get(s) || 0 })).filter(s => s.count > 0);
  }, [dealers, filters, query]);

  const filteredDealers = useMemo(() => {
    const q = tr(query);
    return dealers.filter(d => {
      for (const [k, set] of Object.entries(filters)) {
        if (set.size > 0 && !set.has(d[k] || '')) return false;
      }
      if (onlyWithCoord && !d.koordinat) return false;
      if (q) {
        const hay = tr([d.tabela, d.unvan, d.patron, d.sehir, d.ilce, d.telefon, d.adres, d.notlar, d.bolge].filter(Boolean).join(' '));
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [dealers, filters, query, onlyWithCoord]);

  const toggleFilter = (key, value) => {
    setFilters(prev => {
      const next = { ...prev };
      const set = new Set(prev[key]);
      if (set.has(value)) set.delete(value); else set.add(value);
      next[key] = set;
      if (key === 'bolge') { next.sehir = new Set(); next.ilce = new Set(); }
      if (key === 'sehir') next.ilce = new Set();
      return next;
    });
    setShowLimit(100);
  };

  const clearFilters = () => {
    setFilters({ bolge: new Set(), sehir: new Set(), ilce: new Set(), segment: new Set(), bayiTipi: new Set() });
    setQuery('');
    setOnlyWithCoord(false);
  };

  const activeFilterCount = Object.values(filters).reduce((sum, s) => sum + s.size, 0) + (query ? 1 : 0) + (onlyWithCoord ? 1 : 0);

  const exportCSV = () => {
    const headers = ['BÖLGE', 'ŞEHİR', 'İLÇE', 'TABELA', 'CARİ ÜNVAN', 'PATRON', 'SEGMENT', 'BAYİ TİPİ', 'TELEFON', 'ADRES', 'DURUM', 'KOORDİNAT', 'HARİTA LİNKİ', 'NOT'];
    const rows = filteredDealers.map(d => {
      const koord = d.koordinat ? `${d.koordinat.lat},${d.koordinat.lng}` : '';
      const link = d.koordinat ? mapsUrl(d.koordinat) : '';
      return [d.bolge, d.sehir, d.ilce, d.tabela, d.unvan, d.patron, d.segment, d.bayiTipi, d.telefon, d.adres, d.durum, koord, link, d.notlar].map(v => `"${String(v || '').replace(/"/g, '""')}"`).join(',');
    });
    const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bayi-arama-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  if (loading) return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><div style={{ fontFamily: 'JetBrains Mono, monospace', color: C.inkSoft, fontSize: '12px', letterSpacing: '0.1em' }}>YÜKLENİYOR...</div></div>;

  return (
    <div style={{ minHeight: '100vh' }}>
      <header style={{ borderBottom: `2px solid ${C.ink}`, backgroundColor: C.paper, padding: '20px 32px 16px', position: 'sticky', top: 0, zIndex: 30 }}>
        <div className="flex items-baseline justify-between gap-4 flex-wrap">
          <div>
            <h1 style={{ fontWeight: 800, fontSize: '20px', letterSpacing: '-0.02em', color: C.ink, textTransform: 'uppercase' }}>
              OUNO <span style={{ color: C.accent }}>·</span> BAYİ ARAMA
            </h1>
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', color: C.inkSoft, letterSpacing: '0.15em', marginTop: '4px', textTransform: 'uppercase' }}>
              {dealers.length > 0 ? <>{dealers.length.toLocaleString('tr-TR')} kayıt{bolgeFacets.length > 0 && <> · {new Set(dealers.map(d => d.bolge).filter(Boolean)).size} bölge</>}{meta?.lastUpdated && <> · son güncelleme {new Date(meta.lastUpdated).toLocaleDateString('tr-TR')}</>}</> : 'Veri yok'}
            </div>
          </div>
          <div className="flex items-center gap-2">
            {importStatus && <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', color: importStatus.startsWith('✓') ? '#2D5016' : importStatus.startsWith('✕') ? C.accent : C.inkSoft, marginRight: '8px' }}>{importStatus}</span>}
            {dealers.length > 0 && (
              <>
                <button onClick={exportCSV} style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '6px 12px', fontSize: '12px', backgroundColor: 'transparent', border: `1px solid ${C.borderMid}`, color: C.ink, cursor: 'pointer', fontWeight: 600 }}>
                  <Icon.Download size={13} /> CSV
                </button>
                <button onClick={handleClear} style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '6px 12px', fontSize: '12px', backgroundColor: 'transparent', border: `1px solid ${C.borderMid}`, color: C.accent, cursor: 'pointer', fontWeight: 600 }}>
                  <Icon.Trash size={13} /> Temizle
                </button>
              </>
            )}
          </div>
        </div>
      </header>

      {dealers.length === 0 && !importing && (
        <div style={{ padding: '80px 32px 32px', maxWidth: '720px', margin: '0 auto' }}>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', color: C.accent, letterSpacing: '0.2em', textAlign: 'center', marginBottom: '12px' }}>◆ KURULUM</div>
          <h2 style={{ fontWeight: 800, fontSize: '28px', textAlign: 'center', color: C.ink, letterSpacing: '-0.02em', marginBottom: '8px', lineHeight: 1.15 }}>Bayi Excel dosyalarını yükle</h2>
          <p style={{ textAlign: 'center', color: C.inkSoft, fontSize: '14px', maxWidth: '480px', margin: '0 auto 32px' }}>
            Bölge dosyalarını birden seç. Kolonlar otomatik tanınır. Veri tarayıcında kalır, her açışta hazırdır.
          </p>
          <UploadZone onFiles={handleFiles} hasData={false} />
        </div>
      )}

      {importing && <div style={{ padding: '40px', textAlign: 'center' }}><div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '12px', letterSpacing: '0.1em', color: C.accent }}>⟳ {importStatus}</div></div>}

      {dealers.length > 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: '0' }}>
          <aside style={{ borderRight: `1px solid ${C.border}`, padding: '20px 20px 40px', backgroundColor: C.paper, minHeight: 'calc(100vh - 80px)', position: 'sticky', top: '80px', maxHeight: 'calc(100vh - 80px)', overflowY: 'auto' }}>
            <div style={{ marginBottom: '20px' }}><UploadZone onFiles={handleFiles} hasData={true} /></div>

            {activeFilterCount > 0 && (
              <button onClick={clearFilters} style={{ marginBottom: '16px', padding: '6px 10px', backgroundColor: C.ink, color: C.paper, border: 'none', fontSize: '11px', cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em', width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px' }}>
                <Icon.X size={12} /> FİLTRELERİ TEMİZLE ({activeFilterCount})
              </button>
            )}

            <FilterGroup title="Segment">
              <div>
                {segmentFacets.map(s => <FilterChip key={s.value} label={s.label} count={s.count} active={filters.segment.has(s.value)} onClick={() => toggleFilter('segment', s.value)} />)}
              </div>
              {dealers.some(d => d.koordinat) && (
                <label style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 0 0', cursor: 'pointer', fontSize: '12px', color: C.ink, marginTop: '6px', borderTop: `1px solid ${C.border}` }}>
                  <input type="checkbox" checked={onlyWithCoord} onChange={e => setOnlyWithCoord(e.target.checked)} style={{ accentColor: C.accent, cursor: 'pointer' }} />
                  <Icon.MapPin size={12} color={C.accent} />
                  <span style={{ fontWeight: onlyWithCoord ? 700 : 500 }}>Sadece haritalı bayiler</span>
                  <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', color: C.inkSoft, marginLeft: 'auto' }}>
                    {dealers.filter(d => d.koordinat).length}
                  </span>
                </label>
              )}
            </FilterGroup>

            {bolgeFacets.length > 0 && <FilterGroup title={`Bölge (${bolgeFacets.length})`}><ScrollableList items={bolgeFacets} selected={filters.bolge} onToggle={(v) => toggleFilter('bolge', v)} /></FilterGroup>}
            {sehirFacets.length > 0 && <FilterGroup title={`Şehir (${sehirFacets.length})`}><ScrollableList items={sehirFacets} selected={filters.sehir} onToggle={(v) => toggleFilter('sehir', v)} /></FilterGroup>}
            {ilceFacets.length > 0 && <FilterGroup title={`İlçe (${ilceFacets.length})`} defaultOpen={filters.sehir.size > 0}><ScrollableList items={ilceFacets} selected={filters.ilce} onToggle={(v) => toggleFilter('ilce', v)} /></FilterGroup>}
            {tipFacets.length > 0 && <FilterGroup title={`Bayi Tipi (${tipFacets.length})`} defaultOpen={false}><ScrollableList items={tipFacets} selected={filters.bayiTipi} onToggle={(v) => toggleFilter('bayiTipi', v)} /></FilterGroup>}
          </aside>

          <main style={{ padding: '20px 32px 40px' }}>
            <div style={{ position: 'relative', marginBottom: '20px' }}>
              <div style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)' }}><Icon.Search size={16} color={C.inkSoft} /></div>
              <input type="text" placeholder="Tabela, patron, şehir, telefon, adres, saha notu içinde ara..." value={query}
                onChange={e => { setQuery(e.target.value); setShowLimit(100); }}
                style={{ width: '100%', padding: '14px 14px 14px 40px', fontSize: '14px', border: `1px solid ${C.borderMid}`, backgroundColor: 'transparent', color: C.ink, outline: 'none' }}
                onFocus={e => e.target.style.borderColor = C.accent}
                onBlur={e => e.target.style.borderColor = C.borderMid} />
              {query && <button onClick={() => setQuery('')} style={{ position: 'absolute', right: '12px', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: C.inkSoft }}><Icon.X size={16} /></button>}
            </div>

            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: '16px', paddingBottom: '12px', borderBottom: `1px solid ${C.borderMid}`, flexWrap: 'wrap', gap: '8px' }}>
              <div>
                <span style={{ fontWeight: 800, fontSize: '24px', color: C.ink, letterSpacing: '-0.02em' }}>{filteredDealers.length.toLocaleString('tr-TR')}</span>
                <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', color: C.inkSoft, letterSpacing: '0.1em', marginLeft: '8px', textTransform: 'uppercase' }}>
                  {filteredDealers.length === dealers.length ? 'TOPLAM' : `/ ${dealers.length.toLocaleString('tr-TR')} BAYI`}
                </span>
              </div>
              {filteredDealers.length > 0 && (
                <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', alignItems: 'center' }}>
                  {(() => {
                    const withCoord = filteredDealers.filter(d => d.koordinat).length;
                    return withCoord > 0 ? (
                      <div style={{ display: 'flex', alignItems: 'center', gap: '4px', fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', color: C.accent, fontWeight: 700 }}>
                        <Icon.MapPin size={11} color={C.accent} />
                        <span>{withCoord}</span>
                      </div>
                    ) : null;
                  })()}
                  <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                    {SEG_ORDER.map(s => {
                      const count = filteredDealers.filter(d => d.segment === s).length;
                      if (count === 0) return null;
                      return <div key={s} style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', color: SEG[s].fg, fontWeight: 700 }}><span style={{ opacity: 0.75 }}>{SEG[s].label}</span><span style={{ marginLeft: '4px' }}>{count}</span></div>;
                    })}
                  </div>
                </div>
              )}
            </div>

            {filteredDealers.length === 0 ? (
              <div style={{ padding: '60px 20px', textAlign: 'center', color: C.inkSoft }}>
                <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '12px' }}><Icon.Alert size={32} color={C.borderStrong} /></div>
                <div style={{ fontSize: '14px' }}>Sonuç bulunamadı. Filtreleri temizleyip dene.</div>
              </div>
            ) : (
              <>
                <div style={{ border: `1px solid ${C.border}`, backgroundColor: C.paper }}>
                  {filteredDealers.slice(0, showLimit).map(d => <DealerRow key={d.id} dealer={d} onClick={() => setSelectedDealer(d)} />)}
                </div>
                {filteredDealers.length > showLimit && (
                  <button onClick={() => setShowLimit(s => s + 200)} style={{ marginTop: '20px', padding: '12px 24px', backgroundColor: 'transparent', color: C.accent, border: `1px solid ${C.accent}`, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', letterSpacing: '0.1em', fontWeight: 700, display: 'block', margin: '20px auto' }}>
                    + {Math.min(200, filteredDealers.length - showLimit)} DAHA YÜKLE <span style={{ opacity: 0.6, marginLeft: '8px' }}>({(filteredDealers.length - showLimit).toLocaleString('tr-TR')} kaldı)</span>
                  </button>
                )}
              </>
            )}
          </main>
        </div>
      )}

      <DealerDetail dealer={selectedDealer} onClose={() => setSelectedDealer(null)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
